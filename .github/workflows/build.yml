name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Publish (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: src/OverlayMonitor/OverlayMonitor.csproj

      - name: Restore
        run: dotnet restore OverlayMonitor.sln -r ${{ matrix.rid }}

      - name: Publish self-contained package
        run: >
          dotnet publish src/OverlayMonitor/OverlayMonitor.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          --no-restore
          -o publish/${{ matrix.rid }}

      - name: Create ZIP archive
        shell: pwsh
        run: Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "OverlayMonitor-${{ matrix.rid }}.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: OverlayMonitor-${{ matrix.rid }}
          path: OverlayMonitor-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v6
        with:
          pattern: OverlayMonitor-*
          path: release-assets
          merge-multiple: true

      - name: Create release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" release-assets/*.zip --title "OverlayMonitor $TAG_NAME" --generate-notes --draft
